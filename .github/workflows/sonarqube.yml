name: SonarQube Analysis

# Se ejecuta después de que el workflow CI complete con éxito.
# Descarga el artefacto test-results (coverage.xml + junit.xml) que CI genera
# y lo envía a la instancia self-hosted de SonarQube.
#
# Secrets requeridos (Settings → Secrets and variables → Actions):
#   SONAR_TOKEN    — token de autenticación de la instancia SonarQube
#   SONAR_HOST_URL — URL de la instancia (ej. http://sonarqube.example.com:9000)
#
# La instancia self-hosted debe ser accesible desde los runners de GitHub Actions.

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, develop]

permissions:
  contents: read
  actions: read

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout (commit exacto que pasó CI)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download coverage and test results from CI run
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: tests/reports/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        # Si el artefacto no está disponible (ej. workflow_dispatch manual),
        # SonarQube ejecuta igualmente el análisis sin datos de cobertura.
        continue-on-error: true

      - name: Run SonarQube analysis
        uses: sonarsource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
