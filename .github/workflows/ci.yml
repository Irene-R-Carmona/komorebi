name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Calidad de código — CS Fixer + PHPStan (sin Docker, sin tests)
  # --------------------------------------------------------------------------
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pcntl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-scripts --no-interaction

      - name: Check code style (PHP CS Fixer)
        run: vendor/bin/php-cs-fixer fix --config=.php-cs-fixer.php --dry-run --diff

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --memory-limit=512M --no-progress --error-format=github

  # --------------------------------------------------------------------------
  # Job 2: Auditoría de seguridad de dependencias — composer audit
  # --------------------------------------------------------------------------
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-scripts --no-interaction

      - name: Run Composer security audit
        run: composer audit --format=json | tee /tmp/audit.json || true

      - name: Fail on HIGH / CRITICAL vulnerabilities
        run: |
          HIGH=$(jq '[.advisories | to_entries[].value[] | select((.severity // "") | ascii_upcase | . == "HIGH" or . == "CRITICAL")] | length' /tmp/audit.json 2>/dev/null || echo "0")
          echo "High/Critical vulnerabilities found: ${HIGH}"
          if [ "${HIGH}" -gt "0" ]; then
            echo "FAIL: HIGH or CRITICAL vulnerabilities detected."
            cat /tmp/audit.json
            exit 1
          fi
          echo "PASS: No HIGH or CRITICAL vulnerabilities found."
