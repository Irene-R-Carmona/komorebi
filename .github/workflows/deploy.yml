name: Deploy

# Continuous Delivery — se dispara al mergear a main.
#
# Pasos:
#   1. Build imagen de producción y push a GHCR
#
# Railway escucha el push a main directamente y despliega de forma automática.
# No se necesita un job de "railway up" — eso causaría doble deploy.
#
# Secrets necesarios (Settings → Secrets and variables → Actions):
#   GITHUB_TOKEN      ya disponible (packages: write)

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Build y push de imagen de producción a GHCR
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push production image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile.prod
          push: true
          build-args: |
            BUILD_ENV=production
            INSTALL_DEV=false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
