name: Security Audit

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - composer.json
      - composer.lock
  pull_request:
    branches: [main]
    paths:
      - composer.json
      - composer.lock

permissions:
  contents: read

jobs:
  audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-scripts --no-interaction

      - name: Run Composer security audit
        run: composer audit --format=json | tee /tmp/audit.json
        continue-on-error: true

      - name: Fail on HIGH / CRITICAL vulnerabilities
        run: |
          HIGH=$(cat /tmp/audit.json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          advisories = data.get('advisories', {})
          high_crit = [
              a for pkg in advisories.values()
              for a in (pkg if isinstance(pkg, list) else [pkg])
              if a.get('severity', '').upper() in ('HIGH', 'CRITICAL')
          ]
          print(len(high_crit))
          " 2>/dev/null || echo "0")
          echo "High/Critical vulnerabilities found: ${HIGH}"
          if [ "${HIGH}" -gt "0" ]; then
            echo "❌ HIGH or CRITICAL vulnerabilities detected. Review composer audit output above."
            cat /tmp/audit.json
            exit 1
          fi
          echo "✅ No HIGH or CRITICAL vulnerabilities found."

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit
          path: /tmp/audit.json
