# GitHub Advanced Security — Secret Scanning
# Doc: https://docs.github.com/en/code-security/secret-scanning/configuring-secret-scanning-for-your-repositories
#
# Excluye rutas donde pueden aparecer falsos positivos intencionados
# (credenciales de test, plantillas, vendor).

paths-ignore:
  # Dependencias de terceros
  - "vendor/**"
  - "node_modules/**"

  # Plantilla de entorno (sin valores reales por definición)
  - ".env.example"

  # Credenciales root/root intencionales para entorno de test aislado
  - "docker-compose.test.yml"

  # Credenciales sonar/sonar para SonarQube en dev local (profile: sonar)
  - "docker-compose.override.yml"

  # Hashes Argon2id de prueba — no son contraseñas reales
  - "scripts/check_pass.php"

  # Artefactos de análisis — no código fuente
  - "tests/reports/**"
