# railway.toml — Configuración de despliegue para Railway.app
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/php/Dockerfile.prod"

[deploy]
preDeployCommand = "php /app/scripts/apply-db.php --force"
startCommand = "supervisord -n -c /etc/supervisor/supervisord.conf"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

