# railway.toml — Configuración de despliegue para Railway.app
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/php/Dockerfile.prod"

[deploy]
preDeployCommand = "php /app/scripts/apply-db.php --no-interaction"
startCommand = "supervisord -n -c /etc/supervisor/supervisord.conf"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Variables de entorno requeridas en Railway (ajusta los valores a tu proyecto):
#
#   APP_ENV=production
#   APP_URL=https://komorebi-cafe.up.railway.app
#   APP_KEY=base64:dGhpcy1pcy1hLXNlY3JldC1rZXktMzItY2hhcnMhISE=
#   DATABASE_URL=${{MySQL.MYSQL_URL}}            # Variable de referencia del plugin MySQL
#   REDIS_HOST=${{Redis.REDISHOST}}              # Variable de referencia del plugin Redis
#   REDIS_PORT=${{Redis.REDISPORT}}
#   REDIS_PASSWORD=${{Redis.REDISPASSWORD}}
#   SESSION_DRIVER=redis
#   CACHE_DRIVER=redis
#   CSRF_TOKEN_SECRET=genera-con-bin/generate-secrets.php
#   SESSION_SECRET=genera-con-bin/generate-secrets.php
#   ENCRYPTION_KEY=genera-con-bin/generate-secrets.php
#   FEATURE_BACKOFFICE=1
#   FEATURE_OPS=1
#   FEATURE_KEEPER=1
#   MAX_REQUESTS=500                  # Requests por worker FrankenPHP antes de reciclar el proceso
#
# OBLIGATORIO PARA RAILWAY (evita doble ejecución de migraciones al reiniciar el contenedor):
# Las migraciones se ejecutan UNA SOLA VEZ via preDeployCommand (arriba).
# Si SKIP_MIGRATIONS no está definida, el entrypoint también las ejecutaría (innecesario).
#   SKIP_MIGRATIONS=1
#   MERCURE_JWT_SECRET=genera-con-openssl-rand-base64-32
#   MERCURE_CORS_ORIGINS=https://tu-app.up.railway.app
#
# SMTP (sin dominio propio requerido):
# Opción Gmail App Password (500 emails/día):
#   MAIL_HOST=smtp.gmail.com
#   MAIL_PORT=587
#   MAIL_ENCRYPTION=tls
#   MAIL_USERNAME=tucuenta@gmail.com
#   MAIL_PASSWORD=abcdefghijklmnop   # 16 chars de Google App Password
#   MAIL_FROM_ADDRESS=tucuenta@gmail.com   # DEBE coincidir con MAIL_USERNAME
#   MAIL_FROM_NAME=Komorebi Café
#
# CLOUDINARY — solo CLOUDINARY_URL (formato: cloudinary://api_key:api_secret@cloud_name):
#   CLOUDINARY_URL=cloudinary://api_key:api_secret@cloud_name
#
# OBSERVABILIDAD:
#   SENTRY_DSN=https://xxx@oXX.ingest.sentry.io/xxx
#   BETTER_STACK_SOURCE_TOKEN=tu-token
#   BETTER_STACK_SOURCE_ENDPOINT=https://in.logs.betterstack.com
