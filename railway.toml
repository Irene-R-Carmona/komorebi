# railway.toml — Configuración de despliegue para Railway.app
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/php/Dockerfile.prod"

[deploy]
startCommand = "frankenphp run --config=/app/frankenphp.Caddyfile"
healthcheckPath = "/health.php"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

