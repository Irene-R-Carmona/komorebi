# docker-compose.override.yml
# Servicios exclusivos de desarrollo — se cargan automáticamente con `docker compose up`
# En producción, NO incluir este archivo.

services:

  # ==========================================================================
  # APP - Override para desarrollo: CORS permisivo + root para FrankenPHP
  # FrankenPHP necesita CAP_NET_BIND_SERVICE para el puerto 80.
  # En dev se ejecuta como root y se restituye NET_BIND_SERVICE (cap_drop:ALL lo quitó).
  # ==========================================================================
  app:
    user: root
    cap_add:
      - NET_BIND_SERVICE
    environment:
      CORS_ALLOWED_ORIGINS: "*"
      XDEBUG_MODE: "debug,develop"  # activar IDE debugging en dev local; ignorado en CI

  # ==========================================================================
  # MAILPIT - SMTP capturador + Web UI (solo desarrollo)
  # ==========================================================================
  mailpit:
    image: axllent/mailpit:v1.29.6
    container_name: komorebi_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - komorebi-net

  # ==========================================================================
  # DB - Exponer puerto MySQL al host para IDEs (PhpStorm, DataGrip, TablePlus…)
  # ==========================================================================
  db:
    ports:
      - "3306:3306"
    command:
      - --performance-schema=OFF
      - --innodb-buffer-pool-size=268435456
      - --innodb-buffer-pool-instances=1
      - --innodb-flush-log-at-trx-commit=2
      - --innodb-flush-method=O_DIRECT
      - --max-connections=25
      - --key-buffer-size=16777216
      - --slow-query-log=OFF
      - --event-scheduler=ON

  # ==========================================================================
  # PHPMYADMIN - Gestor web de MySQL (solo desarrollo)
  # ==========================================================================
  pma:
    image: phpmyadmin:5.2.3
    container_name: komorebi_pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${DB_USERNAME}
      PMA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - komorebi-net

  # ==========================================================================
  # REDIS COMMANDER - Visor web de Redis (solo desarrollo)
  # ==========================================================================
  redis_commander:
    image: redis/redisinsight:3.2.0
    container_name: komorebi_redis_commander
    restart: unless-stopped
    environment:
      RI_REDIS_HOST: cache
      RI_REDIS_PORT: 6379
      RI_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
    ports:
      - "8082:5540"
    depends_on:
      - cache
    networks:
      - komorebi-net

  # ─── SonarQube: arrancar solo con `make sonar-up` (profile: sonar) ──────────
  sonarqube:
    image: sonarqube:26.3.0.120487-community
    profiles: [sonar]
    container_name: komorebi_sonarqube
    depends_on:
      - sonarqube_db
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL:      jdbc:postgresql://sonarqube_db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    # Elasticsearch (embedded) requiere vm.max_map_count=524288 en el host Docker
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
    stop_grace_period: 60s
    networks:
      - komorebi-net

  sonarqube_db:
    image: postgres:17-alpine
    profiles: [sonar]
    container_name: komorebi_sonarqube_db
    environment:
      POSTGRES_USER:     sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB:       sonar
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    networks:
      - komorebi-net

  # ==========================================================================
  # TELEGRAM BOT (placeholder documentado)
  # ==========================================================================
  telegram_bot:
    image: alpine:3.20
    profiles: [telegram]
    container_name: komorebi_telegram_bot
    restart: unless-stopped
    command: >
      sh -c "
        echo '[TELEGRAM] Servicio documentado pero no implementado';
        tail -f /dev/null
      "
    networks:
      - komorebi-net

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonarqube_db_data:
