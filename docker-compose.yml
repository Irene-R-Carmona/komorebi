# Variables de entorno compartidas entre app y workers
x-app-env: &app-env
  APP_ENV: "${APP_ENV:-development}"
  APP_KEY: ${APP_KEY}
  DB_HOST: db
  DB_DATABASE: ${DB_DATABASE}
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}
  REDIS_HOST: cache
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
  MAIL_HOST: mailpit
  MAIL_PORT: 1025
  CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:8080}"
  CORS_CREDENTIALS: "${CORS_CREDENTIALS:-false}"
  CORS_MAX_AGE: "${CORS_MAX_AGE:-7200}"

services:

  # ==========================================================================
  # APP - FrankenPHP (Servidor principal)
  # ==========================================================================
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
    container_name: komorebi_app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/app
      - komorebi_storage:/app/storage
    environment:
      <<: *app-env
      XDEBUG_MODE: debug
      SKIP_MIGRATIONS: 0
      SKIP_SEEDERS: 0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    networks:
      - komorebi-net

  # ==========================================================================
  # DATABASE - MySQL 8.4 LTS
  # ==========================================================================
  db:
    image: mysql:8.4
    container_name: komorebi_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # ports:  # No exponer al host; accesible solo dentro de la red Docker
    #   - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - komorebi-net

  # ==========================================================================
  # REDIS 8 (cache + futuro sistema de colas)
  # ==========================================================================
  cache:
    image: redis:8-alpine
    container_name: komorebi_cache
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    # ports:  # No exponer al host; accesible solo dentro de la red Docker
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis_password} ping | grep -c PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - komorebi-net

  # ==========================================================================
  # QUEUE WORKER - Procesa jobs asíncronos (SendEmailJob, etc.)
  # ==========================================================================
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.worker
    container_name: komorebi_queue
    restart: unless-stopped
    command: php /app/bin/worker.php default
    volumes:
      - ./:/app
      - komorebi_storage:/app/storage
    environment:
      <<: *app-env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f worker.php > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m
    networks:
      - komorebi-net

  # ==========================================================================
  # EMAIL WORKER - Procesa cola 'emails' (SendEmailJob)
  # ==========================================================================
  email_worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.worker
    container_name: komorebi_email_worker
    restart: unless-stopped
    command: php /app/bin/email-worker.php
    volumes:
      - ./:/app
      - komorebi_storage:/app/storage
    environment:
      <<: *app-env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f email-worker.php > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m
    networks:
      - komorebi-net

  # ==========================================================================
  # NOTIFICATION WORKER - Procesa cola 'notifications'
  # ==========================================================================
  notification_worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.worker
    container_name: komorebi_notification_worker
    restart: unless-stopped
    command: php /app/bin/notification-worker.php
    volumes:
      - ./:/app
      - komorebi_storage:/app/storage
    environment:
      <<: *app-env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f notification-worker.php > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m
    networks:
      - komorebi-net

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  db_data:
  redis_data:
  komorebi_storage:

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  komorebi-net:
    driver: bridge
