<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260" role="img" aria-labelledby="kc-dark-title">
    <title id="kc-dark-title">Komorebi Café — Logo Principal (Dark)</title>
    <!--
    Versión DARK — fondo Café Oscuro #5C3D2E, símbolo en Crema Cálida #F7F3EB.
    Según §3.5: versión dark para fondos oscuros, señalética exterior, merch.
    El búho en negativo ahora muestra el fondo oscuro #5C3D2E como "figura",
    y la copa aparece en crema #F7F3EB — inversión total de valores de color.
    Los rayos Hikari úsan el ámbar #C9A959 (sin cambio — es el acento de firma).
  -->
    <defs>
        <style>
            .kcd-bg {
                fill: #5C3D2E;
            }

            .kcd-fill {
                fill: #F7F3EB;
            }

            .kcd-eda {
                fill: none;
                stroke: #F7F3EB;
                stroke-width: 1.8;
                stroke-linecap: butt;
            }

            .kcd-hik {
                fill: none;
                stroke: #C9A959;
                stroke-width: 1.0;
                stroke-linecap: butt;
            }
        </style>
    </defs>

    <!-- Fondo sólido -->
    <rect class="kcd-bg" x="0" y="0" width="200" height="260" />

    <!-- SÍMBOLO — translate(25,12) scale(1.5) -->
    <g transform="translate(25, 12) scale(1.5)">

        <!-- Copa + búho en negativo (crema sobre fondo oscuro) -->
        <path class="kcd-fill" fill-rule="evenodd" d="
      M 50,13 Q 45,22 20,61 L 80,61 Q 54,22 50,13 Z

      M 50,30
      C 41,30 40,35 40,40
      C 40,45 43,50 50,50
      C 57,50 60,45 60,40
      C 60,35 59,30 50,30
      Z

      M 45,39 m -2.5,0
      a 2.5,2.5 0 1,0 5,0
      a 2.5,2.5 0 1,0 -5,0

      M 55,39 m -2.5,0
      a 2.5,2.5 0 1,0 5,0
      a 2.5,2.5 0 1,0 -5,0
    " />

        <!-- Tronco — Chikara (力) — crema -->
        <rect class="kcd-fill" x="47.5" y="61" width="5" height="39" />

        <!-- Rama horizontal — Eda (枝) — crema -->
        <line class="kcd-eda" x1="23" y1="72" x2="77" y2="72" />

        <!-- Raíces — Eda (枝) — crema -->
        <line class="kcd-eda" x1="50" y1="100" x2="34" y2="116" />
        <line class="kcd-eda" x1="50" y1="100" x2="66" y2="116" />

        <!-- Rayos de luz — Hikari (光) — ámbar (sin cambio) -->
        <line class="kcd-hik" x1="50" y1="61" x2="30" y2="41" />
        <line class="kcd-hik" x1="50" y1="61" x2="70" y2="41" />
        <line class="kcd-hik" x1="50" y1="61" x2="23" y2="58" />
        <line class="kcd-hik" x1="50" y1="61" x2="77" y2="58" />

    </g>

    <!-- Separador ámbar -->
    <line x1="68" y1="203" x2="132" y2="203" stroke="#C9A959" stroke-width="0.75" stroke-linecap="butt" />

    <!-- Wordmark en crema -->
    <text x="100" y="220" font-family="'Shippori Mincho', 'Noto Serif JP', Georgia, serif" font-weight="300" font-size="13.5" letter-spacing="4.8" text-anchor="middle" fill="#F7F3EB">KOMOREBI</text>

    <text x="102" y="236" font-family="'Shippori Mincho', 'Noto Serif JP', Georgia, serif" font-weight="300" font-size="8.5" letter-spacing="5" text-anchor="middle" fill="#F7F3EB">CAF&#201;</text>

</svg>
