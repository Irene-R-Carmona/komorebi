<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120" role="img" aria-labelledby="kc-icon-title">
    <title id="kc-icon-title">Komorebi Café — Símbolo</title>
    <!--
    Sistema Shōdō — tres pesos de trazo:
      Chikara (力) Trazo Ancla → fill #5C3D2E (tronco como shape relleno)
      Eda     (枝) Trazo Brazo → stroke #5C3D2E, 1.8px
      Hikari  (光) Trazo Vuelo → stroke #C9A959, 1.0px  (ámbar = luz)

    Espacio negativo real — fill-rule=evenodd:
      1 winding  = relleno oscuro (copa de la copa)
      2 windings = transparente   (silueta del búho = fondo visible)
      3 windings = relleno oscuro (ojos del búho)

    Fukinsei (不均整): ctrl-izq x=45 vs ctrl-der x=54 → asimetría ~1.5°
    Los rayos Hikari (ámbar) se colocan sobre la copa oscura:
      sobre el área oscura → ámbar sobre marrón = cálido y visible
      sobre el hueco del búho → ámbar sobre fondo = luz natural del komorebi
  -->
    <defs>
        <style>
            .kc-fill {
                fill: #5C3D2E;
            }

            .kc-eda {
                fill: none;
                stroke: #5C3D2E;
                stroke-width: 1.8;
                stroke-linecap: butt;
            }

            .kc-hikari {
                fill: none;
                stroke: #C9A959;
                stroke-width: 1.0;
                stroke-linecap: butt;
            }
        </style>
    </defs>

    <!-- COPA + BÚHO EN NEGATIVO ─────────────────────────────
       Sub-path 1: copa exterior (Fukinsei aplicado)
         Vértice: (50,13)  Base-izq: (20,61)  Base-der: (80,61)
         Control izq: (45,22) → 5u izq del eje
         Control der: (54,22) → 4u der del eje  [asimetría]
       Sub-path 2: cuerpo del búho
         Oval de y=30 a y=50, ancho ±10 en el ecuador
       Sub-path 3/4: ojos del búho en (45,39) y (55,39) r=2.5  -->
    <path class="kc-fill" fill-rule="evenodd" d="
    M 50,13 Q 45,22 20,61 L 80,61 Q 54,22 50,13 Z

    M 50,30
    C 41,30 40,35 40,40
    C 40,45 43,50 50,50
    C 57,50 60,45 60,40
    C 60,35 59,30 50,30
    Z

    M 45,39 m -2.5,0
    a 2.5,2.5 0 1,0 5,0
    a 2.5,2.5 0 1,0 -5,0

    M 55,39 m -2.5,0
    a 2.5,2.5 0 1,0 5,0
    a 2.5,2.5 0 1,0 -5,0
  " />

    <!-- TRONCO — Chikara (力) — shape relleno, 5px de ancho -->
    <rect class="kc-fill" x="47.5" y="61" width="5" height="39" />

    <!-- RAMA HORIZONTAL — Eda (枝) — 1.8px -->
    <line class="kc-eda" x1="23" y1="72" x2="77" y2="72" />

    <!-- RAÍCES — Eda (枝) — 1.8px, ±45° -->
    <line class="kc-eda" x1="50" y1="100" x2="34" y2="116" />
    <line class="kc-eda" x1="50" y1="100" x2="66" y2="116" />

    <!-- RAYOS DE LUZ — Hikari (光) — ámbar 1px ─────────────
       Desde la intersección (50,61) hacia la copa.
       ±45° (internos, atraviesan el hueco del búho)
       ±15° (oblicuos, recorren los bordes de la copa)            -->
    <line class="kc-hikari" x1="50" y1="61" x2="30" y2="41" />
    <line class="kc-hikari" x1="50" y1="61" x2="70" y2="41" />
    <line class="kc-hikari" x1="50" y1="61" x2="23" y2="58" />
    <line class="kc-hikari" x1="50" y1="61" x2="77" y2="58" />

</svg>
