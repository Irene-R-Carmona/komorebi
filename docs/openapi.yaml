              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: about:blank
                title: Forbidden
                status: 403
                detail: No tienes un café asignado
                code: cafe_not_assigned
        "500":
          description: Error interno
          content:
            application/problem+json:
              schema:
