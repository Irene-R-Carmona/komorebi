  # ============================================================
  # SUPERVISOR
  # ============================================================

  /supervisor/assign:
    post:
      summary: Asignar reserva a una mesa
      description: |
        Crea una asignación de mesa para una reserva existente.
        Requiere rol supervisor, manager o admin.
        También requiere CSRF token (header `X-CSRF-Token` o campo `_token` en el body).
      operationId: supervisorAssign
      tags:
        - supervisor
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reservation_id
                - table_code
              properties:
                reservation_id:
                  type: integer
                  example: 123
                  description: ID de la reserva a asignar
                table_code:
                  type: string
                  example: A1
                  description: Código identificador de la mesa
            example:
              reservation_id: 123
              table_code: A1
      responses:
        "200":
          description: Mesa asignada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Mesa asignada correctamente
                  data:
                    $ref: "#/components/schemas/Assignment"
              example:
                success: true
                message: Mesa asignada correctamente
                data:
                  id: 1
                  reservation_id: 123
                  table_code: A1
        "401":
          description: No autenticado
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: Sin rol suficiente para asignar mesas
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: about:blank
                title: Forbidden
                status: 403
                detail: No tienes permisos para asignar mesas
                code: forbidden
        "422":
          description: Datos válidos pero la regla de negocio falla (ej. reserva ya asignada, mesa no existe)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: about:blank
                title: Unprocessable Entity
                status: 422
                detail: La reserva ya tiene una mesa asignada
                code: validation_error
        "500":
          description: Error interno al crear la asignación
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /supervisor/assignments:
    get:
      summary: Listar todas las asignaciones
      description: |
        Devuelve la lista completa de asignaciones de mesas activas.
        Requiere al menos sesión iniciada (lógica interna verifica rol supervisor/manager/admin).
      operationId: supervisorListAssignments
      tags:
        - supervisor
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Lista de asignaciones
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Assignment"
              example:
                success: true
                data:
                  - id: 1
                    reservation_id: 123
                    table_code: A1
                  - id: 2
                    reservation_id: 124
                    table_code: B3
        "401":
          description: No autenticado
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Error interno al listar asignaciones
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: about:blank
                title: Internal Server Error
                status: 500
                detail: Error al obtener asignaciones
                code: server_error
