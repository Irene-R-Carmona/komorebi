[supervisord]
nodaemon=true
user=www-data
logfile=/dev/stdout
logfile_maxbytes=0
loglevel=info

[program:queue_default]
command=php /app/bin/worker.php default
directory=/app
autostart=true
autorestart=true
startretries=3
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stopwaitsecs=60
stopsignal=TERM

[program:queue_emails]
command=php /app/bin/email-worker.php
directory=/app
autostart=true
autorestart=true
startretries=3
numprocs=2
process_name=%(program_name)s_%(process_num)02d
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stopwaitsecs=60
stopsignal=TERM

[program:queue_notifications]
command=php /app/bin/notification-worker.php
directory=/app
autostart=true
autorestart=true
startretries=3
numprocs=2
process_name=%(program_name)s_%(process_num)02d
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stopwaitsecs=60
stopsignal=TERM
