; OPcache para workers PHP-CLI (queue, email, notification workers)
; SIN preload: preloading no aplica en CLI (se ignora o genera warnings).
; JIT habilitado para mejorar rendimiento de workers de larga duración.
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.validate_timestamps=0
opcache.jit=1255
opcache.jit_buffer_size=64M
opcache.revalidate_freq=0
