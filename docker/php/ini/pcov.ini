; Habilita la extensión pcov para recolección de cobertura de código.
; pcov es incompatible con opcache — véase opcache-test.ini que lo deshabilita.

extension=pcov

; Activo por defecto en entorno de test
pcov.enabled = 1

; Sólo medir cobertura dentro del código de aplicación (excluye vendor/ y tests/)
pcov.directory = /app/app
